const headers=Object.keys(rows[0]);
const head=document.querySelector("#head");
const body=document.querySelector("#body");
const q=document.querySelector("#q");
const field=document.querySelector("#field");
const source=document.querySelector("#source");
const certainty=document.querySelector("#certainty");
const summary=document.querySelector("#summary");
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
head.innerHTML=headers.map(h=>`<th>${esc(h)}</th>`).join("");
function rowMatches(row){
  const text=Object.values(row).join(" ").toLowerCase();
  const query=q.value.trim().toLowerCase();
  return (!query||text.includes(query))&&
    (field.value==="すべて"||row["分野"]===field.value)&&
    (source.value==="すべて"||row["最有力種別"]===source.value)&&
    (certainty.value==="すべて"||row["確度"]===certainty.value);
}
function cell(h,v){
  if(h.endsWith("URL"))return `<td><a href="${esc(v)}">${esc(v)}</a></td>`;
  if(h==="確度")return `<td><span class="badge ${v==="高"?"high":"mid"}">${esc(v)}</span></td>`;
  return `<td>${esc(v)}</td>`;
}
function render(){
  const filtered=rows.filter(rowMatches);
  body.innerHTML=filtered.length
    ? filtered.map(row=>`<tr>${headers.map(h=>cell(h,row[h])).join("")}</tr>`).join("")
    : `<tr><td class="empty" colspan="${headers.length}">条件に一致する行がありません。</td></tr>`;
  const byField={};
  const bySource={};
  filtered.forEach(r=>{byField[r["分野"]]=(byField[r["分野"]]||0)+1; bySource[r["最有力種別"]]=(bySource[r["最有力種別"]]||0)+1;});
  summary.innerHTML=[
    `表示 ${filtered.length} / ${rows.length} 件`,
    ...Object.entries(byField).map(([k,v])=>`${k} ${v}件`),
    ...Object.entries(bySource).map(([k,v])=>`${k} ${v}件`)
  ].map(x=>`<span>${esc(x)}</span>`).join("");
}
[q,field,source,certainty].forEach(el=>el.addEventListener("input",render));
render();
